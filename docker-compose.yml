version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/var/www/html
    env_file:
      - .env

  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    env_file:
      - .env
  worker:
    build: .
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    # Явно указываем путь /var/www/html/worker.php
    command: php /var/www/html/worker.php
    depends_on:
      - rabbitmq
    env_file:
      - .env
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    env_file:
      - .env